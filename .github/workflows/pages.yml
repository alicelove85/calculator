name: GitHub Pages 배포

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (HTML/CSS/JS만)
        run: |
          mkdir -p _site
          cp index.html reverse.html loss.html speed.html styles.css app.js reverse.js loss.js speed.js tab.js .nojekyll _site/
          cp site.webmanifest icon.svg icon-180.png icon-192.png icon-512.png _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
